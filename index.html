<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Générateur Loto</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #eef2f3; padding-top: 50px; color: #333; }
        .container { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .boule { display: inline-block; width: 50px; height: 50px; line-height: 50px; background: radial-gradient(circle at 15px 15px, #3498db, #2980b9); color: white; border-radius: 50%; margin: 8px; font-weight: bold; font-size: 20px; box-shadow: 2px 4px 6px rgba(0,0,0,0.2); }
        .etoile { background: radial-gradient(circle at 15px 15px, #f1c40f, #f39c12); color: #2c3e50; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #27ae60; color: white; border: none; border-radius: 50px; margin-top: 30px; transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
        button:hover { background-color: #219150; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        #resultat { min-height: 80px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍀 Tirage Euromillions</h1>
    <div id="resultat">
        <p>Prêt pour le tirage ?</p>
    </div>
    <button onclick="generer()">Lancer le tirage</button>
</div>

<script>
    function generer() {
        // Tirage des 5 numéros (1 à 50)
        let numeros = [];
        while(numeros.length < 5) {
            let n = Math.floor(Math.random() * 50) + 1;
            if(!numeros.includes(n)) numeros.push(n);
        }
        numeros.sort((a, b) => a - b);

        // Tirage des 2 étoiles (1 à 12)
        let etoiles = [];
        while(etoiles.length < 2) {
            let e = Math.floor(Math.random() * 12) + 1;
            if(!etoiles.includes(e)) etoiles.push(e);
        }
        etoiles.sort((a, b) => a - b);

        // Affichage des boules
        let resultatDiv = document.getElementById('resultat');
        resultatDiv.innerHTML = ""; // On vide le texte précédent

        numeros.forEach(num => {
            let div = document.createElement('div');
            div.className = 'boule';
            div.textContent = num;
            resultatDiv.appendChild(div);
        });

        etoiles.forEach(et => {
            let div = document.createElement('div');
            div.className = 'boule etoile';
            div.textContent = et;
            resultatDiv.appendChild(div);
        });
    }
</script>

</body>
</html>
